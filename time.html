

<html>
<head>
    <title>Display Time</title>
</head>
<body>

<script>
    let time = [10, 36, 13];

    let hours = time[0];
    let minutes = time[1];
    let seconds = time[2];

    if (
        hours >= 0 && hours <= 23 &&
        minutes >= 0 && minutes < 60 &&
        seconds >= 0 && seconds < 60
    ) {
        document.write(
            String(hours).padStart(2, '0') + ":" +
            String(minutes).padStart(2, '0') + ":" +
            String(seconds).padStart(2, '0')
        );
    } else {
        document.write("Invalid Time");
    }
</script>

</body>
</html>
