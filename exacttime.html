
<html>
<head>
    <title>Current Time</title>
</head>
<body>

<h1 id="time"></h1>

<script>
    function showTime() {
        document.getElementById("time").innerHTML =
            new Date().toLocaleTimeString();
    }

    showTime();               
    setInterval(showTime, 1000); 
</script>

</body>
</html>
