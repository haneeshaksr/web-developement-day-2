<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Grid</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: yellow;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 2fr);
            grid-template-rows: repeat(2, 2fr);
            height: 100vh;
        }

        .grid-item {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid black;
            font-size: 3rem;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-item">Welcome</div>
        <div class="grid-item">welcome</div>
        <div class="grid-item">welcome</div>
        <div class="grid-item">welcome</div>
        <div class="grid-item">welcome</div>
        <div class="grid-item">welcome</div>
    </div>
</body>
</html>
